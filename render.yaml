services:
  - type: web
    name: apnaservo-admin
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start -- -H 0.0.0.0
    healthCheckPath: /company/login
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_AUTH_DISABLED
        value: "true"
      - key: NEXT_PUBLIC_ENABLE_DEMO_DATA
        value: "false"
      - key: APNASERVO_BACKEND_URL
        sync: false
      - key: NEXT_PUBLIC_APNASERVO_BACKEND_URL
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: ADMIN_BACKEND_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: DATABASE_URL
        sync: false
